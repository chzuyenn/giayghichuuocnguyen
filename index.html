<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOVELIST - Lovers Gallery</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=VT323&family=Inter:wght@400;700&display=swap');

    :root {
        --bg-gray: #e0e0e0;
        --accent-black: #1a1a1a;
        --text-gray: #666;
    }

    * { box-sizing: border-box; cursor: url('https://cdn.custom-cursor.com/db/cursor/32/Retro_Aesthetics_Strawberry_Cursor.png'), auto; }

    body {
        margin: 0;
        background-color: #000;
        font-family: 'Inter', sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
    }

    .main-player-card {
        width: 900px;
        height: 600px;
        background-color: var(--bg-gray);
        border-radius: 20px;
        position: relative;
        display: grid;
        grid-template-columns: 80px 1fr;
        padding: 20px;
        box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }

    /* 1. LOVELIST MARQUEE (CHỮ CHẠY) */
    .marquee-container {
        grid-column: 2;
        overflow: hidden;
        white-space: nowrap;
        background: #d0d0d0;
        border-radius: 10px;
        padding: 5px 0;
        margin-bottom: 20px;
        border: 1px solid #bbb;
    }

    .marquee-content {
        display: inline-block;
        animation: marquee 100s linear infinite;
        font-family: 'VT323', monospace;
        font-size: 24px;
        letter-spacing: 50px; /* Cách xa nhau như yêu cầu */
        color: var(--accent-black);
        text-transform: uppercase;
    }

    @keyframes marquee {
        0% { transform: translateX(100%); }
        100% { transform: translateX(-100%); }
    }

    /* 2. SIDEBAR (CHỈ GIỮ NGÔI NHÀ) */
    .sidebar {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding-top: 20px;
        border-right: 1px solid #ccc;
    }
    .home-icon { font-size: 24px; color: #333; margin-bottom: 30px; text-decoration: none; }

    /* 3. LAYOUT CHÍNH */
    .content-grid {
        display: grid;
        grid-template-columns: 1.2fr 1fr;
        gap: 30px;
        padding: 0 20px;
    }

    /* MÁY NGHE NHẠC IPOD */
    .ipod-container {
        background: #fff;
        border-radius: 15px;
        padding: 20px;
        border: 1px solid #ccc;
        box-shadow: inset 0 0 10px rgba(0,0,0,0.05);
        text-align: center;
    }

    .ipod-shell {
        position: relative;
        width: 100%;
        max-width: 320px;
        margin: 0 auto;
    }

    .ipod-bg { width: 100%; display: block; }

    .ipod-screen {
        position: absolute;
        top: 15.5%;
        left: 8.5%;
        width: 48%;
        height: 52%;
        background: #000;
        overflow: hidden;
        border-radius: 2px;
    }

    .ipod-screen img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: opacity 0.5s;
    }

    /* ĐIỀU KHIỂN NHẠC */
    .music-info { margin-top: 15px; font-family: 'VT323', monospace; }
    .song-title { font-size: 28px; margin: 0; }
    .controls {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 20px;
        margin-top: 15px;
    }
    .btn-ctrl { background: none; border: none; font-size: 24px; color: #333; }
    .play-pause { font-size: 40px; }

    /* 4. LOVERS GALLERY */
    .gallery-section h2 { font-family: 'VT323', monospace; font-size: 32px; margin-top: 0; }

    .categories-nav {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 15px;
    }
    .cat-btn {
        background: #f0f0f0;
        border: 1px solid #ccc;
        padding: 5px 15px;
        border-radius: 20px;
        font-size: 13px;
        transition: 0.3s;
    }
    .cat-btn.active { background: #000; color: #fff; }

    .character-slider {
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .char-card {
        width: 140px;
        background: #fff;
        border-radius: 10px;
        overflow: hidden;
        border: 1px solid #ccc;
        text-decoration: none;
        color: inherit;
        display: none; /* Sẽ hiện bằng JS */
    }
    .char-card img { width: 100%; height: 180px; object-fit: cover; }
    .char-info { padding: 8px; font-size: 12px; font-weight: bold; text-align: center; }

    /* 5. FAVORITE PLAYLIST (DANH SÁCH NHẠC) */
    .playlist-scroll {
        margin-top: 20px;
        height: 150px;
        overflow-y: auto;
        background: rgba(255,255,255,0.5);
        border-radius: 10px;
        padding: 10px;
    }
    .playlist-item {
        display: flex;
        align-items: center;
        padding: 8px;
        border-bottom: 1px solid #eee;
        font-size: 14px;
        cursor: pointer;
    }
    .playlist-item:hover { background: #fff; }
    .playlist-item.active { border-left: 4px solid #000; font-weight: bold; }

</style>
</head>
<body>

<div class="main-player-card">
    <!-- SIDEBAR -->
    <div class="sidebar">
        <a href="#" class="home-icon">🏠</a>
    </div>

    <div class="main-body">
        <!-- CHỮ CHẠY LOVELIST -->
        <div class="marquee-container">
            <div class="marquee-content">
                L O V E L I S T L O V E L I S T L O V E L I S T L O V E L I S T
            </div>
        </div>

        <div class="content-grid">
            <!-- PHẦN MÁY NGHE NHẠC IPOD -->
            <div class="ipod-container">
                <div class="ipod-shell">
                    <!-- THAY LINK ẢNH IPOD EM GỬI VÀO ĐÂY -->
                    <img src="music-removebg-preview.png" class="ipod-bg" alt="iPod">
                    <div class="ipod-screen">
                        <img id="song-art" src="https://i.pinimg.com/736x/02/a7/32/02a7322fd86ac76adf697e007823837d.jpg" alt="Art">
                    </div>
                </div>

                <div class="music-info">
                    <h3 id="display-title" class="song-title">Loading...</h3>
                    <p id="display-artist">Artist Name</p>
                    <div class="controls">
                        <button class="btn-ctrl" onclick="prevSong()">⏮</button>
                        <button class="btn-ctrl play-pause" id="play-btn" onclick="togglePlay()">▶</button>
                        <button class="btn-ctrl" onclick="nextSong()">⏭</button>
                    </div>
                </div>

                <div class="playlist-scroll" id="playlist">
                    <!-- Danh sách bài hát tự động load ở đây -->
                </div>
            </div>

            <!-- PHẦN GALLERY NHÂN VẬT -->
            <div class="gallery-section">
                <h2>Lovers Gallery</h2>
                
                <div class="categories-nav">
                    <button class="btn-ctrl" onclick="scrollCat(-1)">◀</button>
                    <div id="cat-list" style="display:flex; gap:5px;">
                        <button class="cat-btn active" onclick="filterChar('đương thời', this)">đương thời</button>
                        <button class="cat-btn" onclick="filterChar('ngành', this)">ngành</button>
                        <button class="cat-btn" onclick="filterChar('tổng tài', this)">tổng tài</button>
                    </div>
                    <button class="btn-ctrl" onclick="scrollCat(1)">▶</button>
                </div>

                <div class="character-slider">
                    <button class="btn-ctrl">◀</button>
                    <div id="char-display" style="display:flex; gap:15px;">
                        <!-- Character Cards -->
                        <a href="LINK_VỚI_VIỄN_THẦN" class="char-card" data-type="đương thời">
                            <img src="https://i.pinimg.com/736x/02/a7/32/02a7322fd86ac76adf697e007823837d.jpg" alt="Vienthan">
                            <div class="char-info">Viễn Thần</div>
                        </a>
                        <a href="LINK_VỚI_CỐ_TỬ_VŨ" class="char-card" data-type="ngành">
                            <img src="https://i.pinimg.com/736x/02/a7/32/02a7322fd86ac76adf697e007823837d.jpg" alt="Cotuvu">
                            <div class="char-info">Cố Tử Vũ</div>
                        </a>
                    </div>
                    <button class="btn-ctrl">▶</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Audio hidden -->
<audio id="main-audio" autoplay loop></audio>

<script>
    // DỮ LIỆU NHẠC CỦA DUYÊN
    const songs = [
        { title: "Song 1", artist: "Artist A", src: "LINK_FILE_NHAC_1", art: "https://via.placeholder.com/150/ff9999" },
        { title: "Song 2", artist: "Artist B", src: "LINK_FILE_NHAC_2", art: "https://via.placeholder.com/150/99ff99" },
        { title: "Song 3", artist: "Artist C", src: "LINK_FILE_NHAC_3", art: "https://via.placeholder.com/150/9999ff" }
    ];

    let currentIdx = 0;
    const audio = document.getElementById('main-audio');
    const playBtn = document.getElementById('play-btn');

    function initPlayer() {
        // Load playlist
        const pl = document.getElementById('playlist');
        songs.forEach((s, i) => {
            let div = document.createElement('div');
            div.className = 'playlist-item';
            div.innerHTML = `<span>${i+1}. ${s.title}</span>`;
            div.onclick = () => loadSong(i);
            pl.appendChild(div);
        });
        loadSong(0);
    }

    function loadSong(idx) {
        currentIdx = idx;
        const s = songs[idx];
        audio.src = s.src;
        document.getElementById('song-art').src = s.art;
        document.getElementById('display-title').innerText = s.title;
        document.getElementById('display-artist').innerText = s.artist;
        
        // Highlight active song
        document.querySelectorAll('.playlist-item').forEach((item, i) => {
            item.classList.toggle('active', i === idx);
        });
        
        audio.play();
        playBtn.innerText = '⏸';
    }

    function togglePlay() {
        if (audio.paused) {
            audio.play();
            playBtn.innerText = '⏸';
        } else {
            audio.pause();
            playBtn.innerText = '▶';
        }
    }

    function nextSong() {
        currentIdx = (currentIdx + 1) % songs.length;
        loadSong(currentIdx);
    }

    function prevSong() {
        currentIdx = (currentIdx - 1 + songs.length) % songs.length;
        loadSong(currentIdx);
    }

    // GALLERY FILTER
    function filterChar(type, btn) {
        // Active button style
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        // Filter cards
        document.querySelectorAll('.char-card').forEach(card => {
            if (card.dataset.type === type) {
                card.style.display = 'block';
            } else {
                card.style.display = 'none';
            }
        });
    }

    // Khởi tạo mặc định
    window.onload = () => {
        initPlayer();
        filterChar('đương thời', document.querySelector('.cat-btn'));
    };
</script>

</body>
</html>
