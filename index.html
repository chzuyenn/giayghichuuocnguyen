<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tao Mệt Lắm Rồi</title>
<style>
/* Tổng thể trang web theo tone Hồng Coquette & Vintage */
body {
font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
padding: 20px;
background-color: #fff5f7;
background-image: url('https://i.pinimg.com/736x/1e/9e/c5/1e9ec5b51f5088b773f568969c5089f5.jpg');
display: flex;
flex-direction: column;
align-items: center;
min-height: 100vh;
}

.container {
width: 100%;
max-width: 550px;
background: rgba(255, 255, 255, 0.9);
padding: 30px;
border-radius: 30px;
box-shadow: 0 10px 30px rgba(255, 182, 193, 0.3);
border: 2px solid #ffc0cb;
}

/* Tiêu đề kiểu Noble & Lấp lánh */
h2 {
text-align: center;
font-family: 'Georgia', serif;
font-style: italic;
font-size: 28px;
letter-spacing: 1px;
margin-bottom: 25px;
background: linear-gradient(45deg, #d4a5a5 20%, #ffc0cb 40%, #fff 80%, #d4a5a5 100%);
background-size: 200% auto;
color: transparent;
-webkit-background-clip: text;
background-clip: text;
animation: sparkle 3s linear infinite;
text-shadow: 0 0 5px rgba(255, 255, 255, 0.2);
}

@keyframes sparkle {
to { background-position: 200% center; }
}

.avatar-container {
display: flex;
justify-content: center;
margin-bottom: 20px;
}

.avatar {
width: 80px; /* Anh tăng size lên tí cho xinh */
height: 80px;
border-radius: 50%;
border: 3px solid #ffc0cb;
box-shadow: 0 5px 15px rgba(255, 182, 193, 0.4);
object-fit: cover;
background-color: #fff;
}

/* Ô tìm kiếm bo tròn */
#searchBox {
width: 100%;
padding: 15px 25px;
border: 2px solid #ffc0cb;
border-radius: 50px;
font-size: 16px;
outline: none;
box-sizing: border-box;
transition: 0.3s;
color: #888;
background: #fff;
}

#searchBox:focus {
border-color: #d4a5a5;
box-shadow: 0 0 10px rgba(212, 165, 165, 0.2);
}

#suggestions {
background: white;
border: 1px solid #ffc0cb;
border-top: none;
max-height: 200px;
overflow-y: auto;
display: none;
border-radius: 0 0 20px 20px;
}

.suggestion-item {
padding: 15px;
cursor: pointer;
border-bottom: 1px solid #fff0f3;
color: #a67c7c;
font-size: 14px;
}

.suggestion-item:hover { background: #fff0f3; }

#answerCard {
margin-top: 25px;
padding: 25px;
background: #fff;
border-radius: 20px;
display: none;
box-shadow: inset 0 0 15px rgba(255, 192, 203, 0.1);
border: 1px solid #ffc0cb;
position: relative;
}

#answerCard::before {
content: '✿';
position: absolute;
top: -15px;
left: 50%;
transform: translateX(-50%);
background: #fff5f7;
color: #ffc0cb;
padding: 0 10px;
font-size: 20px;
}

.ans-title {
font-weight: bold;
color: #d4a5a5;
margin-bottom: 15px;
font-family: 'Georgia', serif;
border-bottom: 1px solid #eee;
padding-bottom: 5px;
}

.ans-content { font-size: 17px; color: #555; line-height: 1.8; }

img {
max-width: 100%;
height: auto;
border-radius: 15px;
margin-top: 15px;
border: 3px solid #fff;
box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}
</style>
</head>
<body>

<div class="container">
<h2>Giấy Ghi Chú Ước Nguyện</h2>
<div class="avatar-container">
<img src="https://i.pinimg.com/736x/ab/7e/31/ab7e31789b6336fd5a0fb08c7bc02ca2.jpg" alt="Avatar" class="avatar">
</div>
<input type="text" id="searchBox" placeholder="Tôi yêu Ahn KeonHo..." oninput="handleInput()">
<div id="suggestions"></div>

<div id="answerCard">
<div class="ans-title">TỤI CON</div>
<div id="finalAnswer" class="ans-content"></div>
</div>
</div>

<script>
const data = [
{ q: "Cô Huyền ơiii", a: "iu cô rất nhìuuuuuuuuuuuuuu" },
];

const searchBox = document.getElementById('searchBox');
const suggestions = document.getElementById('suggestions');
const answerCard = document.getElementById('answerCard');
const finalAnswer = document.getElementById('finalAnswer');

function handleInput() {
const val = searchBox.value.toLowerCase().trim();
suggestions.innerHTML = '';
answerCard.style.display = 'none';

if (val === '') {
suggestions.style.display = 'none';
return;
}

const matches = data.filter(item => item.q.toLowerCase().includes(val));

if (matches.length > 0) {
suggestions.style.display = 'block';
matches.forEach(item => {
const div = document.createElement('div');
div.className = 'suggestion-item';
div.innerText = item.q;
div.onclick = () => {
searchBox.value = item.q;
showResult(item.a);
};
suggestions.appendChild(div);
if (val === item.q.toLowerCase()) {
showResult(item.a);
}
});
} else {
suggestions.style.display = 'none';
}
}

function showResult(ans) {
suggestions.style.display = 'none';
answerCard.style.display = 'block';
finalAnswer.innerHTML = ans;
}
</script>
</body>
</html>
