<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>LoveList</title>
<style>
body {
    margin: 0;
    padding: 0;
    font-family: sans-serif;
    background-color: #f4f4f4;
    /* Ví dụ thay đổi con trỏ chuột: */
    /* cursor: url('cursor-custom.png'), pointer; */
}

.container {
    display: grid;
    grid-template-columns: 60px 1fr;
    grid-template-rows: 60px 1fr;
    grid-template-areas:
        "sidebar top"
        "sidebar main";
}

.top-bar {
    grid-area: top;
    background: #fff;
    display: flex;
    align-items: center;
    padding: 0 20px;
    justify-content: space-between;
}

.top-bar .logo {
    font-size: 20px;
    font-weight: bold;
    letter-spacing: 5px;
}

.top-bar input {
    flex: 1;
    margin: 0 20px;
    padding: 5px 10px;
    font-size: 16px;
}

.top-icons .icon {
    margin-left: 15px;
    cursor: pointer;
}

.sidebar {
    grid-area: sidebar;
    background: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 20px;
}

.sidebar .icon-home {
    font-size: 24px;
    text-decoration: none;
    color: #000;
}

.content {
    grid-area: main;
    padding: 20px;
    display: flex;
}

.player, .gallery {
    background: #fff;
    border-radius: 10px;
    padding: 15px;
}

.player {
    flex: 1;
    margin-right: 20px;
}

.player-image {
    position: relative;
    margin-bottom: 20px;
}

.player-image img {
    width: 100%;
    max-width: 300px;
    display: block;
}

.player-image .screen {
    position: absolute;
    top: 10px;
    left: 10px;
    width: 120px;
    height: 80px;
    background: #000;
}

.track-info {
    margin-bottom: 10px;
}

.track-info .track-title {
    font-size: 18px;
    font-weight: bold;
}

.track-info .track-album {
    font-size: 14px;
    color: #555;
}

.track-actions .fav {
    background: #000;
    color: #fff;
    padding: 3px 8px;
    border-radius: 5px;
    font-size: 12px;
}

.controls span {
    margin-right: 10px;
    cursor: pointer;
    font-size: 20px;
}

.controls .play {
    font-size: 24px;
    padding: 5px;
    border: 2px solid #000;
    border-radius: 50%;
}

.gallery {
    flex: 1;
    margin-left: 20px;
    display: flex;
    flex-direction: column;
}

.gallery h2 {
    margin-top: 0;
    font-size: 18px;
}

.categories {
    display: flex;
    flex-wrap: wrap;
    margin-bottom: 10px;
}

.categories .category {
    background: #eee;
    padding: 5px 10px;
    margin: 5px;
    border-radius: 3px;
    cursor: pointer;
}

.categories .active {
    background: #ccc;
}

.persons {
    display: flex;
}

.person {
    margin-right: 10px;
    text-align: center;
}

.person img {
    width: 100px;
    height: 100px;
    object-fit: cover;
    border-radius: 5px;
}

.person .name {
    margin-top: 5px;
    font-size: 14px;
}

.favorite-playlists {
    margin-top: 20px;
}

.favorite-playlists h3 {
    margin: 0 0 10px;
    font-size: 16px;
}

.playlist-item {
    display: flex;
    align-items: center;
    margin-bottom: 10px;
}

.playlist-item img {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    margin-right: 10px;
}

.playlist-info .playlist-title {
    font-weight: bold;
    font-size: 14px;
}

.playlist-info .playlist-count {
    font-size: 12px;
    color: #888;
}

.play-btn {
    margin-left: auto;
    font-size: 16px;
    background: none;
    border: none;
    cursor: pointer;
}
</style>
</head>
<body>
<div class="container">
  <header class="top-bar">
    <!-- Thanh trên cùng: logo và thanh tìm kiếm -->
    <div class="logo">LoveList</div>
    <input type="text" placeholder="Tìm bài hát, nghệ sĩ...">
    <div class="top-icons">
      <span class="icon">🔔</span>
      <span class="icon">⚙</span>
    </div>
  </header>

  <!-- Sidebar bên trái chỉ có icon Home -->
  <aside class="sidebar">
    <a href="#" class="icon-home">🏠</a>
  </aside>

  <!-- Nội dung chính -->
  <main class="content">
    <!-- Phần trình phát nhạc -->
    <section class="player">
      <div class="player-image">
        <!-- Hình máy nghe nhạc (đĩa than) -->
        <img src="music-removebg-preview.png" alt="Music Player">
        <div class="screen"></div> <!-- Khu vực màn hình để chèn ảnh bìa bài -->
      </div>
      <div class="track-info">
        <div class="track-title">The Suffering</div>
        <div class="track-album">Bài hát yêu thích</div>
        <div class="track-actions">
          <span class="fav">+ 392</span>
        </div>
      </div>
      <div class="controls">
        <span>&#9664;&#9664;</span>
        <span class="play">&#9654;</span>
        <span>&#9654;&#9654;</span>
        <span class="shuffle">🔀</span>
      </div>
    </section>

    <!-- Phần Lovers Gallery -->
    <section class="gallery">
      <h2>Lovers Gallery</h2>
      <div class="categories">
        <span class="category active">Đương Thời</span>
        <span class="category">Thanh Xuân Vườn Trường</span>
        <span class="category">Ngành</span>
        <span class="category">Tổng Tài</span>
        <span class="category">Cún Con</span>
        <span class="category">Gay</span>
      </div>
      <div class="persons">
        <!-- Danh sách nhân vật (nhấp ảnh để dẫn tới trang của họ) -->
        <div class="person">
          <img src="co-tu-vu.jpg" alt="Cố Tử Vũ">
          <div class="name">Cố Tử Vũ</div>
        </div>
        <div class="person">
          <img src="vien-than.jpg" alt="Viễn Thần">
          <div class="name">Viễn Thần</div>
        </div>
        <!-- Có thể thêm hình nhân vật khác tại đây -->
      </div>
      <div class="favorite-playlists">
        <h3>Playlist yêu thích (4)</h3>
        <div class="playlist-item">
          <img src="profile1.jpg" alt="">
          <div class="playlist-info">
            <div class="playlist-title">Best of Eren</div>
            <div class="playlist-count">32 bài</div>
          </div>
          <button class="play-btn">&#9654;</button>
        </div>
        <div class="playlist-item">
          <img src="profile2.jpg" alt="">
          <div class="playlist-info">
            <div class="playlist-title">Best of Luffy</div>
            <div class="playlist-count">28 bài</div>
          </div>
          <button class="play-btn">&#9654;</button>
        </div>
      </div>
    </section>
  </main>
</div>
</body>
</html>
